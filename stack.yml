version: '3.8'

services:
  reloj:
    image: ghcr.io/bryanstevenliga/reloj_devops:latest
    networks:
      - traefik-public
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        # Configuración HTTP (Redirección automática a HTTPS)
        - "traefik.http.routers.reloj.entrypoints=http"
        - "traefik.http.routers.reloj.rule=Host(`reloj.byronrm.com`)"
        - "traefik.http.middlewares.reloj-https-redirect.redirectscheme.scheme=https"
        - "traefik.http.routers.reloj.middlewares=reloj-https-redirect"
        
        # Configuración HTTPS Segura con TLS
        - "traefik.http.routers.reloj-secure.entrypoints=https"
        - "traefik.http.routers.reloj-secure.rule=Host(`reloj.byronrm.com`)"
        - "traefik.http.routers.reloj-secure.tls=true"
        - "traefik.http.routers.reloj-secure.tls.certresolver=http"
        - "traefik.http.routers.reloj-secure.service=reloj"
        
        # Puerto interno de tu aplicación Flask en app.py
        - "traefik.http.services.reloj.loadbalancer.server.port=5000"
        - "traefik.docker.network=traefik-public"

networks:
  traefik-public:
    external: true