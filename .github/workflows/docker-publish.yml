name: reloj steven

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Formatear nombre
        id: string
        run: echo "IMAGE_ID=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build y Push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.string.outputs.IMAGE_ID }}:latest

      - name: Variables locales
        run: |
          echo "${{ secrets.VPS_HOST }}"
          echo "${{ secrets.VPS_USER }}"
          echo "${{ secrets.VPS_PASSWORD }}"
          echo "${{ secrets.VPS_SSH_PORT }}"

      - name: SSH VPS Diagnostico
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            pwd
            hostname
            whoami
            uptime
            touch quintoa.txt
            echo "probado ssh en el vps" >> quintoa.txt

      - name: pasar archivos al ssh
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: "stack.yml,makefile"
          target: "/home/${{ secrets.VPS_USER }}/landinga"

      - name: Despliegue directo de los servicios
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            cd /home/${{ secrets.VPS_USER }}/landinga
            
            # Login en el VPS usando tu Token de acceso de GitHub
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Descargar la imagen nueva directamente
            docker pull ghcr.io/${{ steps.string.outputs.IMAGE_ID }}:latest
            
            # Desplegar/Actualizar directamente encima (sin borrar el anterior, como dice tu profesor)
            docker stack deploy -c stack.yml --with-registry-auth reloj_stack
            
            # Verificación en consola
            docker service ls