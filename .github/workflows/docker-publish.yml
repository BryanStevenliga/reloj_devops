name: reloj steven

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Formatear nombre
        id: string
        run: echo "IMAGE_ID=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build y Push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.string.outputs.IMAGE_ID }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push 

    steps:
      - name: Variables locales
        run: |
          echo "${{ secrets.VPS_HOST }}"
          echo "${{ secrets.VPS_USER }}"
          echo "${{ secrets.VPS_PASSWORD }}"
          echo "${{ secrets.VPS_SSH_PORT }}"

      - name: SSH VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            hostname
            whoami
            uptime
            if [ ! -d "/home/0504786674/PRACTICA-DEVOPS" ]; then
              git clone https://github.com/BryanStevenliga/PRACTICA-DEVOPS.git /home/0504786674/PRACTICA-DEVOPS
            fi
            cd /home/0504786674/PRACTICA-DEVOPS
            git pull origin main
            docker compose down
            docker compose up -d --build