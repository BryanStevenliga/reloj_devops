name: reloj steven

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Iniciar sesión en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convertir nombre a minúsculas
        id: string
        run: echo "IMAGE_ID=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Construir y subir imagen de Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.string.outputs.IMAGE_ID }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push 

    steps:
      - name: mostrar variables solo locales 
        run: |
          echo "host: ${{ secrets.VPS_HOST }}"
          echo "username: ${{ secrets.VPS_USER }}"
          echo "password: ${{ secrets.VPS_PASSWORD }}"
          echo "port: ${{ secrets.VPS_SSH_PORT }}"

      - name: probar la ssh en el vps 
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            echo "provando conexion en el vps"
            mkdir -p ~/despliegue
            cd ~/despliegue
            hostname
            whoami
            uptime